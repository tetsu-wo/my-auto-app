  frontend:
    build: ./frontend
    container_name: my_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    # 👇 ここを追加（sh -c で型同期とNext.js起動を連続で実行）
    command: sh -c "sleep 15 && npm run generate-api && npm run dev"
    # ※「npm run generate」の部分は、お使いの package.json にある型同期コマンド（openapi-gen 等）に書き換えてください。

