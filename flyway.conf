# Aivenのコンソールから取得したConnection URIをJDBC形式に変換して記述
flyway.url=jdbc:postgresql://【Aivenのホスト名】:【ポート番号】/【データベース名】?sslmode=require
flyway.user=avnadmin
flyway.password=【Aivenのパスワード】

# マイグレーションファイルの場所を指定
flyway.locations=filesystem:./db/migration

# 履歴テーブルの名前（デフォルトのままでOK）
flyway.table=flyway_schema_history
