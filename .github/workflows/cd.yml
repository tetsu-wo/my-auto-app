name: Continuous Deployment

on:
  workflow_run:
    workflows: [ Fullstack CI (with Docker) ] # 👈 ci.ymlの「name:」に指定した文字列と完全一致させる
    types:
      - completed # ワークフローが終了した時を指定

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 👈 最重要：CIが「成功(success)」で終わった場合のみ、このデプロイジョブを実行する
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # workflow_runイベントの場合、デフォルトではトリガーとなったCI時のコミットを反映するため、明示的に指定
          ref: ${{ github.event.workflow_run.head_branch }}

      # --------- Vercel (フロントエンド) のデプロイ ---------
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Clean Old Vercel Cache
        run: rm -rf ./frontend/.vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install dependencies
        run: npm ci　--workspace=frontend

      - name: Generate API Types
        run: npm run generate-api

#      - name: Build Project Artifacts
#        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --webpack
#        env:
#          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
#          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
#
#      - name: Link Production Dependencies
#        run: npm prune --production
#
#      - name: Deploy Project Artifacts to Vercel
#        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
#        env:
#          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
#          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy to Vercel
        run: vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}

      # --------- Render (バックエンド) のデプロイ -----------
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
