name: Fullstack CI (with Docker)

on:
  pull_request:
    branches: [ main ]
    # 💡 Dockerfileの変更時にもCIが走るように対象を追加
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  # --- Docker環境でバックエンドとフロントエンドをまとめてテスト ---
  docker-fullstack-ci:
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - uses: actions/checkout@v4

      # 2. Docker環境のセットアップ（ビルドの高速化に必要）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Compose を使って全コンテナをビルド＆起動
      # 💡 これにより、ローカルと全く同じDockerfile、同じ手順（sleep、型同期）で検証が走ります
      - name: Build and Start Containers
        run: |
          docker compose up --build -d

      # 4. バックエンドの動作確認（必要に応じて追加）
      # ※もしテストコードを走らせたい場合は、コンテナ内で実行させます
      - name: Run Backend Tests inside Container
        run: |
          docker compose exec -T backend ./gradlew test

      # 5. フロントエンドの検証（型同期やビルドが成功して、コンテナが生きているか確認）
      - name: Check Frontend Container Status
        run: |
          # フロントエンドコンテナが正常に起動（Up）しているかステータスを確認
          if [ "$(docker inspect -f '{{.State.Running}}' my_frontend)" != "true" ]; then
            echo "Frontend container is not running!"
            docker compose logs frontend
            exit 1
          fi

      # 6. 後片付け
      - name: Stop Containers
        if: always() # 途中でエラーが起きても必ず実行する
        run: docker compose down
